# Example service — PostgreSQL with pgvector.
# Remove or replace this file with your own services.

services:
  musher-postgres:
    image: pgvector/pgvector:pg17
    container_name: musher-postgres
    restart: unless-stopped
    ports:
      - "15432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: app
    volumes:
      - musher-postgres-data:/var/lib/postgresql/data
      - ../init-sql:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 3s
      retries: 5
