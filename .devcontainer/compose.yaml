# Musher Dev Container — Docker Compose orchestrator.
# Each stack lives in its own folder under stacks/ (its compose.yaml plus any
# config it needs); add a new folder there and include its compose.yaml below.
# Services run inside Docker-in-Docker via startup.sh.
#
# Port Allocation:
#   15432  PostgreSQL         15440  MinIO API (obs.)
#   15433  Redis              15441  MinIO Console (obs.)
#   15434  MinIO API          15442  Tempo
#   15435  MinIO Console      15443  Loki
#   15436  OCI Registry       15444  VictoriaMetrics
#   15460  Azimutt            15445  OTel HTTP
#                             15446  OTel gRPC
#                             15447  Grafana
#                             15448  Pyroscope

include:
  - stacks/postgres/compose.yaml
  - stacks/redis/compose.yaml
  - stacks/minio/compose.yaml
  - stacks/registry/compose.yaml
  - stacks/azimutt/compose.yaml
  - stacks/observability/compose.yaml

networks:
  default:
    name: musher-dev
