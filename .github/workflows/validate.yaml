name: Validate

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  shellcheck:
    name: ShellCheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Run ShellCheck
        uses: ludeeus/action-shellcheck@2.0.0
        env:
          SHELLCHECK_OPTS: -x --source-path=SCRIPTDIR
        with:
          scandir: .devcontainer/scripts

  compose:
    name: Compose Config
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Validate compose config
        run: |
          cp .devcontainer/.env.example .devcontainer/.env
          docker compose -f .devcontainer/compose.yaml config --quiet
      - name: Reject floating image tags
        run: |
          # Fail on :latest / :main tags that are not digest-pinned (@sha256:...).
          if grep -rnE 'image:.*(:latest|:main)([[:space:]]|$)' \
               .devcontainer/compose.yaml .devcontainer/stacks/; then
            echo "::error::Floating image tag found. Pin to a version or digest." >&2
            exit 1
          fi

  lockfile:
    name: Devcontainer Lockfile
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Enforce devcontainer-lock.json is current
        # --frozen-lockfile fails if the committed lock is missing or its
        # resolved Feature digests drift from devcontainer.json.
        run: npx -y @devcontainers/cli build --workspace-folder . --frozen-lockfile

  env-check:
    name: Env Template Sync
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Install Task
        uses: arduino/setup-task@v2
        with:
          version: 3.x
          repo-token: ${{ secrets.GITHUB_TOKEN }}
      - name: Verify .env / .env.example stay in sync
        run: |
          cp .devcontainer/.env.example .devcontainer/.env
          task env:check

  build:
    name: Devcontainer Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Build devcontainer
        uses: devcontainers/ci@v0.3
        with:
          runCmd: echo "devcontainer smoke test passed"
