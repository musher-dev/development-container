name: Validate

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  shellcheck:
    name: ShellCheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run ShellCheck
        uses: ludeeus/action-shellcheck@2.0.0
        env:
          SHELLCHECK_OPTS: -x --source-path=SCRIPTDIR
        with:
          scandir: .devcontainer/scripts

  compose:
    name: Compose Config
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate compose config
        run: |
          cp .devcontainer/.env.example .devcontainer/.env
          docker compose -f .devcontainer/compose.yaml config --quiet

  env-check:
    name: Env Template Sync
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Task
        uses: arduino/setup-task@v2
        with:
          version: 3.x
          repo-token: ${{ secrets.GITHUB_TOKEN }}
      - name: Verify .env / .env.example stay in sync
        run: |
          cp .devcontainer/.env.example .devcontainer/.env
          task env:check

  build:
    name: Devcontainer Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build devcontainer
        uses: devcontainers/ci@v0.3
        with:
          runCmd: echo "devcontainer smoke test passed"
