# Dependabot keeps the dev container supply chain fresh.
# Docs: https://containers.dev/guide/dependabot
#
# - devcontainers  : bumps Features in devcontainer.json AND refreshes
#                    .devcontainer/devcontainer-lock.json (digest pins).
# - github-actions : bumps the actions pinned in .github/workflows/.
# - docker         : bumps the image tags in the compose files.
version: 2
updates:
  - package-ecosystem: "devcontainers"
    directory: "/"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "devcontainer"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "ci"

  # Compose service images. Each stack lives in .devcontainer/stacks/<name>/ with
  # its own standard-named compose.yaml (pulled in via `include:`), so the
  # .devcontainer root and every stack folder are scanned. If Dependabot does not
  # surface PRs for a stack, verify detection under
  # Insights -> Dependency graph -> Dependabot and adjust these directories.
  - package-ecosystem: "docker"
    directories:
      - "/.devcontainer"
      - "/.devcontainer/stacks/**"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "docker"
